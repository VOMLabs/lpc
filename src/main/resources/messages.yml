# LPC MiniMessage X - Messages Configuration
# All plugin messages are configurable here using MiniMessage format

# Prefix added before every message (set to "" to disable, a space is added automatically)
prefix: ""

# Reload message
reload: "<green>Reloaded LPC Configuration!</green>"

# Chat filter messages
chat:
  spam-warning: "<red>Please slow down!</red>"
  blocked-message: "<red>Your message was blocked by the chat filter.</red>"

# Mute system messages
mute:
  muted: "<green>Muted %player%!</green>"
  unmuted: "<green>Unmuted %player%!</green>"
  already-muted: "<yellow>%player% is already muted.</yellow>"
  not-muted: "<yellow>%player% is not muted.</yellow>"
  mute-list-updated: "<green>Updated mute list!</green>"
  player-not-found: "<red>Player not found: %player%</red>"
  console-usage: "<red>Console must specify both source and target players.</red>"

# Permission/error messages
error:
  no-permission: "<red>You don't have permission to do this.</red>"
  player-only: "<red>This command can only be used by players.</red>"
  usage:
    lpc: "<red>Usage: /lpc reload</red>"
    mute: "<red>Usage: /lpc mute <player> [player2...]</red>"

# Item placeholder
item:
  no-item: "Air"

# Private Message (MSG) system
msg:
  usage: "<red>Usage: /msg <player> <message> or /msg toggle</red>"
  player-not-found: "<red>Player not found: %player%</red>"
  disabled: "<yellow>%player% has private messages disabled.</yellow>"
  ignored: "<yellow>%player% has ignored you.</yellow>"
  toggle-on: "<green>Private messages enabled!</green>"
  toggle-off: "<green>Private messages disabled!</green>"
  send: "<gray>[Me -> %player%]<reset> %message%"
  receive: "<gray>[%player% -> Me]<reset> %message%"

# Player format overrides
format:
  current: "<yellow>Current chat format: %format%</yellow>"
  none: "<yellow>You have no custom chat format set.</yellow>"
  set: "<green>Chat format set to: %format%</green>"
  cleared: "<green>Custom chat format cleared!</green>"
  not-found: "<red>Format not found: %format%</red>"

# Chat Suspend system
suspend:
  suspended: "<red>You have been suspended from chat!</red>\n<yellow>Reason: %reason%</yellow>\n<gray>Time remaining: Check with /lpc suspension</gray>"
  unsuspended: "<green>You are no longer suspended from chat.</green>"
  notify: "<red>Your chat has been suspended!</red>\n<yellow>Reason: %reason%</yellow>"
  chat-blocked: "<red>You cannot chat right now.</red>\n<yellow>Reason: %reason%</yellow>"
  suspension-info: "<yellow>Suspension info:</yellow>\n<gray>Reason: %reason%</gray>\n<gray>Time left: %time-left% seconds</gray>"

# Translation system
translate:
  enabled: "<green>Chat translation enabled!</green>"
  disabled: "<green>Chat translation disabled!</green>"

# URL Filter
url:
  blocked: "<red>URLs are not allowed in chat!</red>"

# Emoji Messages
emoji:
  no-permission: "<red>You don't have permission to use emojis.</red>"
  custom-no-permission: "<red>You don't have permission to use this custom emoji.</red>"

# Report System
report:
  no-permission: "<red>You don't have permission to report players.</red>"
  submitted: "<green>Report submitted for %player%!</green>"
  notify-staff: "<yellow>[Report] %reporter% reported %player% for: %reason%</yellow>"
  not-found: "<red>Player not found: %player%</red>"
  usage: "<red>Usage: /lpc report <player> <reason></red>"

# Error/Usage messages
error:
  usage:
    lpc: "<red>Usage: /lpc <reload|format|suspend|unsuspend|translate|report></red>"
    mute: "<red>Usage: /lpc mute <player> [player2...]</red>"
    suspend: "<red>Usage: /lpc suspend <player> [time_seconds] [reason]</red>"
    unsuspend: "<red>Usage: /lpc unsuspend <player></red>"

# Emoji Messages
emoji:
  no-permission: "<red>You don't have permission to use emojis.</red>"
  custom-no-permission: "<red>You don't have permission to use this custom emoji.</red>"
