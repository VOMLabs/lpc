# LPC MiniMessage X Configuration

# Storage Settings
storage:
  # Supported types: yaml, json, h2, sqlite, mysql, mariadb, mongodb
  type: yaml

  # MySQL Settings (only if storage.type = mysql)
  mysql:
    host: "localhost"
    port: 3306
    database: "lpc"
    username: "root"
    password: ""

  # MariaDB Settings (only if storage.type = mariadb)
  mariadb:
    host: "localhost"
    port: 3306
    database: "lpc"
    username: "root"
    password: ""

# Discord Webhook Settings
discord:
  enabled: false
  webhook-url: ""
  use-discordsrv: true

# Chat Filter Settings
filter:
  # Anti-Spam Settings
  anti-spam:
    enabled: true
    # Minimum time between messages in milliseconds (500ms = 0.5s)
    min-time-between-messages: 500
    # Maximum number of messages allowed within the time window
    max-messages-per-window: 5
    # Time window in seconds to check for spam
    time-window-seconds: 5

  # Swear Filter Settings
  swear:
    enabled: true
    # Characters to replace swear words with
    replacement: "*"
    # Also filter item names when using [ITEM] placeholder
    filter-item-names: true
    # List of words to filter (case-insensitive, whole word match)
    words:
      - "shit"
      - "fuck"
      - "damn"
      - "bitch"
      - "asshole"
      - "bastard"
      - "cunt"
      - "dick"
      - "piss"
      - "slut"
      - "whore"

# Placeholders (supports both %placeholder% and <placeholder> formats):
# %message% / <message> - the chat message
# %name% / <name> - the player's name
# %displayname% / <displayname> - the player's display name / nickname
# %world% / <world> - the world name of the player's current world
# %prefix% / <prefix> - the player's highest priority prefix
# %suffix% / <suffix> - the player's highest priority suffix
# %prefixes% / <prefixes> - the player's prefixes sorted by the highest priority
# %suffixes% / <suffixes> - the player's suffixes sorted by the highest priority
# %username-color% / <username-color> - the player's or the group's username color
# %message-color% / <message-color> - the player's or the group's message color
# %balance% / <balance> - the player's current economy balance (requires Vault + economy plugin)
# %balance-formatted% / <balance-formatted> - the player's formatted economy balance (requires Vault + economy plugin)
# %player-health% / <player-health> - the player's current health
# %player-level% / <player-level> - the player's current level
# %world-time% / <world-time> - the current world time
# %player-uuid% / <player-uuid> - the player's UUID

# MiniMessage Gradient and Rainbow support:
# You can use <gradient:color1:color2:...>text</gradient> and <rainbow>text</rainbow> in chat formats.
# Examples:
#   chat-format: "<gradient:red:blue><name></gradient><dark_gray> »<reset> <message>"
#   chat-format: "<rainbow><name></rainbow><dark_gray> »<reset> <message>"
#   chat-format: "<gradient:#FF0000:#00FF00:#0000FF><name></gradient><dark_gray> »<reset> <message>"

chat-format: "<prefix><name><dark_gray> »<reset> <message>"

# Format per group (optional)
group-formats:
#  default: "[default] <name><dark_gray> »<reset> <message>"
#  admin: "[admin] <name><dark_gray> »<reset> <message>"

# Format per track (optional)
track-formats:
#  staff_track: "[staff] <name><dark_gray> »<reset> <message>"
#  donator_track: "{donator_rank} <name><dark_gray> »<reset> <message>"

# Enable the [ITEM] placeholder
use-item-placeholder: true

# Reload message
reload-message: "<green>Reloaded LPC Configuration!"
